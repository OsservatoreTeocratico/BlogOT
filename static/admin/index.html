<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Moderatori - Osservatore Teocratico</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      if (window.netlifyIdentity) {
        // Inizializzazione
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            // Se l'utente non è loggato, monitora il login
            window.netlifyIdentity.on("login", () => {
              // Usa il percorso relativo "./" per evitare errori di 404
              document.location.href = "./";
            });
          }
        });

        // Gestione Logout: riporta l'utente alla home del blog se esce
        window.netlifyIdentity.on("logout", () => {
          document.location.href = "../";
        });
      }
    </script>
  </body>
</html>
